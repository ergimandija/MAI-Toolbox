<div class="h-screen flex flex-col bg-white">

    <app-chat-header (useKnowledgeBaseChange)="useKnowledgeBase.set($event)" (sliderValueChange)="modelTemperature.set($event)"></app-chat-header>


    <!-- Messages -->

    <main class="
        flex-1
        overflow-y-auto
        px-6
        py-8
        space-y-6
        bg-white
    "
    id="messageContainer">
        <!-- Assistant -->
        <app-chat-bubble message="hello, how may i assist you"  />

        <ng-container #container></ng-container>
        
    </main>


    <!-- Input -->

    <footer class="
        p-5
        bg-white
        border-t
        border-gray-200
    ">

        <div class="flex gap-3 items-end">
        
            <textarea 
                #messageInput
                type="text"
                (keyup.enter)="sendMessage()"
                [(ngModel)]="currentMessage"
                (input)="autoResize(messageInput)"
                placeholder="Type a message..."
                rows="1"
                class="
                    resize-none
                    flex-1
                    px-5
                    py-4
                    rounded-2xl
                    border
                    border-gray-300
                    outline-none
                    focus:border-green-500
                "
            ></textarea>

            @if(this.loadingResponse()){
                <button
                (click)="cancelGeneration()"
                 class="
                 h-14 shrink-0 grow-0
                    px-6
                    rounded-2xl
                    bg-red-500
                    text-white
                    font-semibold
                    hover:bg-red-600
                    transition
                ">X</button>
            } @else {
                <button 
                (click)="sendMessage()"
                
                class="
                    h-14 shrink-0 grow-0
                    px-6
                    rounded-2xl
                    bg-green-500
                    text-white
                    font-semibold
                    hover:bg-green-400
                    transition
                ">
                    Send
                </button>
            }
        </div>

    </footer>

</div>
