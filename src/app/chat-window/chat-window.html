<div class="h-screen flex flex-col bg-white">

    <!-- Header -->

    <header class="
        px-6
        py-4
        bg-gradient-to-r
        from-green-950
        via-emerald-800
        to-green-600
        text-white
        flex
        items-center
        justify-between
        shadow-lg
    ">

        <h1 class="text-xl font-bold">
            mandijaGPT
        </h1>

        <div class="w-3 h-3 rounded-full bg-green-300 animate-pulse"></div>

    </header>


    <!-- Messages -->

    <main class="
        flex-1
        overflow-y-auto
        px-6
        py-8
        space-y-6
        bg-white
    "
    id="messageContainer">
        <!-- Assistant -->
        <app-chat-bubble message="hello, how may i assist you"  />

        <ng-container #container></ng-container>
        
    </main>


    <!-- Input -->

    <footer class="
        p-5
        bg-white
        border-t
        border-gray-200
    ">

        <div class="flex gap-3">

            <input
                type="text"
                (keyup.enter)="sendMessage()"
                [(ngModel)]="currentMessage"
                placeholder="Type a message..."
                class="
                    flex-1
                    px-5
                    py-4
                    rounded-2xl
                    border
                    border-gray-300
                    outline-none
                    focus:border-green-500
                "
            >

            @if(this.loadingResponse()){
                <button
                (click)="cancelGeneration()"
                 class="
                    px-6
                    rounded-2xl
                    bg-red-500
                    text-white
                    font-semibold
                    hover:bg-red-600
                    transition
                ">X</button>
            } @else {
                <button 
                (click)="sendMessage()"
                
                class="
                    px-6
                    rounded-2xl
                    bg-green-500
                    text-white
                    font-semibold
                    hover:bg-green-400
                    transition
                ">
                    Send
                </button>
            }
        </div>

    </footer>

</div>
