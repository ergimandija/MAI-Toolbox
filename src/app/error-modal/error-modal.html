<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/50 p-4 backdrop-blur-sm"
  role="presentation"
  (click)="closed.emit()"
>
  <section
    class="w-full max-w-md rounded-3xl bg-white p-6 text-center shadow-2xl sm:p-8"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="error-modal-title"
    aria-describedby="error-modal-message"
    (click)="$event.stopPropagation()"
  >
    <div class="mx-auto flex size-16 items-center justify-center rounded-full bg-red-100 text-red-600 sm:size-20">
      <svg class="size-9 sm:size-11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9.303 3.376c.866 1.5-.217 3.374-1.949 3.374H4.646c-1.732 0-2.815-1.874-1.949-3.374L10.051 3.38c.866-1.5 3.032-1.5 3.898 0l7.354 12.746ZM12 16.5h.008v.008H12V16.5Z" />
      </svg>
    </div>

    <h2 id="error-modal-title" class="mt-5 text-xl font-bold text-slate-900 sm:text-2xl">Something went wrong</h2>
    <p id="error-modal-message" class="mt-3 break-words text-sm leading-6 text-slate-600 sm:text-base">
      {{ errorMessage() }}
    </p>

    <button
      type="button"
      class="mt-7 w-full rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-200 sm:w-auto sm:min-w-32"
      (click)="closed.emit()"
    >
      Close
    </button>
  </section>
</div>
