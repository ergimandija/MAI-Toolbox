<header class="
        px-6
        py-4
        bg-gradient-to-r
        from-green-950
        via-emerald-800
        to-green-600
        text-white
        flex
        items-center
        justify-between
        shadow-lg
    ">

    <h1 class="text-xl font-bold">
        mandijaGPT
    </h1>
    <div class="flex items-center gap-2">
        <h1 class="text-lg font-semibold" (click)="this.menuOpen.set(!this.menuOpen())">
            {{ this.selectedModel() }}
        </h1>
        <div [hidden]="!this.menuOpen()"
            class="absolute top-16 right-6 bg-white text-black rounded-lg shadow-lg p-6 py-8 flex flex-col gap-2 ">
            <div class="px-5 py-2 border-b border-slate-200 flex flex-col gap-2">
                <h1 class="text-lg font-semibold">Settings</h1>
            </div>
            <div class="px-5 py-2  flex flex-col gap-2">
                <h1 class="text-md font-medium">Model Temperature</h1>
                <app-range-slider [min]="0" [max]="2" [step]="0.2" [(value)]="sliderValue"></app-range-slider>
            </div>
            <div class="px-5 py-2 flex flex-col gap-2">

                <h1 class="text-md font-medium">Use Knowledge Base</h1>
                <div class="relative inline-block w-11 h-5">
                    <input [checked]="useKnowledgeBase()" (change)="useKnowledgeBase.set($event.target.checked)" id="switch-component-green" type="checkbox"
                        class="peer appearance-none w-11 h-5 bg-slate-100 rounded-full checked:bg-green-600 cursor-pointer transition-colors duration-300" />
                    <label for="switch-component-green"
                        class="absolute top-0 left-0 w-5 h-5 bg-white rounded-full border border-slate-300 shadow-sm transition-transform duration-300 peer-checked:translate-x-6 peer-checked:border-green-600 cursor-pointer">
                    </label>
                </div>
            </div>
            <div class="px-5 py-2 flex flex-col gap-2">
                <h1 class="text-md font-medium">Other Models</h1>
                <ul class="flex flex-col gap-1">
                    @for(model of models; track model) {
                    <li (click)="this.selectedModel.set(model.name)"
                        class="cursor-pointer hover:bg-gray-200 rounded px-2 py-1"
                        [class.font-bold]="model.name === selectedModel()">
                        {{ model.name }}
                        <p class="text-sm text-gray-500">{{ model.desc }}</p>
                    </li>
                    }
                </ul>
            </div>
        </div>
        <div class="w-3 h-3 rounded-full bg-green-300 animate-pulse"></div>
    </div>


</header>
