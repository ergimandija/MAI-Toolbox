<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>


<title>Green Chat Landing</title>
</head>

<body class="relative min-h-screen overflow-hidden bg-gradient-to-br from-green-950 via-emerald-800 to-green-500">

<!-- Background blobs -->

<div class="absolute inset-0 overflow-hidden">

<div class="absolute top-10 left-10 w-96 h-96 bg-green-400 opacity-20 blur-3xl rounded-full animate-pulse"></div>

<div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-emerald-300 opacity-20 blur-3xl rounded-full animate-pulse"></div>

</div>


<!-- Main Content -->

<div class="relative flex flex-col items-center justify-center min-h-screen gap-10 px-4">

    <!-- Animated Window Message -->

    <div class="float-animation message-animation">

        <div class="w-[440px] rounded-3xl overflow-hidden backdrop-blur-xl border border-white/20 bg-white/10 shadow-2xl">

            <!-- Fake window bar -->

            <div class="flex items-center gap-2 px-4 py-3 bg-white/10 border-b border-white/10">

                <div class="w-3 h-3 rounded-full bg-red-400"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                <div class="w-3 h-3 rounded-full bg-green-400"></div>

            </div>

            <div class="p-6 text-white">

                <p class="text-sm opacity-70 mb-2">
                    Assistant
                </p>

                <h2 class="text-2xl font-bold mb-3">
                    Welcome to Mandija GPT 👋
                </h2>

                <p class="text-green-100">
                    Ready to start chatting? Click below and jump into the conversation.
                </p>

            </div>

        </div>

    </div>


    <!-- Button -->

    <a
        routerLink = "/chat-window"
        class="
        px-10 py-5
        rounded-2xl
        text-xl
        font-bold
        text-green-900
        bg-white
        shadow-2xl
        hover:scale-105
        hover:shadow-green-900/30
        transition-all
        duration-300
        "

    >
        Open Chat
    </a>

</div>

</body>
</html>
